
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Nunito:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .cat-page { font-family: 'Nunito', sans-serif; padding: 1.5rem 1rem 2rem; display: flex; flex-direction: column; align-items: center; width: 100%; }
  .header { width: 100%; text-align: center; margin-bottom: 0.1rem; }
  .title { font-family: 'Black Ops One', cursive; font-size: 2.8rem; letter-spacing: 4px; color: var(--color-text-primary); line-height: 1.1; }
  .title .paw { font-family: 'Nunito', sans-serif; font-size: 2rem; vertical-align: middle; }
  .subtitle { font-size: 0.95rem; color: var(--color-text-secondary); margin-top: 0.3rem; }
  .tabs { display: flex; gap: 8px; margin: 1.4rem 0 1rem; justify-content: center; }
  .tab { padding: 6px 14px; border-radius: 50px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); font-family: 'Nunito', sans-serif; font-size: 0.82rem; cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s; }
  .tab:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
  .tab.active { background: #E24B4A; color: #fff; border-color: #E24B4A; font-weight: 700; }
  .cat-frame { width: 320px; height: 280px; border-radius: 18px; border: 2px solid var(--color-border-secondary); background: var(--color-background-secondary); overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 1.4rem; }
  .cat-frame.shake { animation: shake 0.4s ease; }
  @keyframes shake { 0%{transform:translate(0,0) rotate(0deg)} 15%{transform:translate(-6px,2px) rotate(-2deg)} 30%{transform:translate(6px,-2px) rotate(2deg)} 45%{transform:translate(-4px,2px) rotate(-1deg)} 60%{transform:translate(4px,-1px) rotate(1deg)} 75%{transform:translate(-2px,1px) rotate(0deg)} 100%{transform:translate(0,0) rotate(0deg)} }
  .cat-frame img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.2s ease; }
  .cat-frame img.hidden { opacity: 0; }
  .placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .placeholder svg { opacity: 0.35; }
  .placeholder span { font-size: 0.85rem; color: var(--color-text-tertiary); }
  .attack-btn { font-family: 'Black Ops One', cursive; font-size: 1.25rem; letter-spacing: 2px; padding: 0.85rem 2.4rem; border-radius: 50px; border: none; background: #E24B4A; color: #fff; cursor: pointer; transition: transform 0.1s, background 0.15s; box-shadow: 0 4px 0 #A32D2D; position: relative; top: 0; display: block; margin: 0 auto; }
  .attack-btn:hover { background: #d03939; }
  .attack-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #A32D2D; top: 3px; }
  .attack-btn:disabled { opacity: 0.6; cursor: default; }
  .counter { margin-top: 1rem; font-size: 0.8rem; color: var(--color-text-tertiary); letter-spacing: 1px; text-transform: uppercase; text-align: center; }
  .credit { margin-top: 1.6rem; font-size: 0.75rem; color: var(--color-text-tertiary); text-align: center; }
  .credit a { color: #E24B4A; text-decoration: none; font-weight: 700; }
  .credit a:hover { text-decoration: underline; }
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; width: 100%; max-width: 340px; margin-top: 0.5rem; }
  .thumb { width: 100%; aspect-ratio: 1; border-radius: 10px; object-fit: cover; border: 1.5px solid var(--color-border-tertiary); cursor: pointer; transition: border-color 0.15s, transform 0.15s; }
  .thumb:hover { border-color: #E24B4A; transform: scale(1.04); }
  .paw-trail { position: absolute; pointer-events: none; font-size: 1.4rem; animation: fadePaw 0.8s ease forwards; z-index: 999; }
  @keyframes fadePaw { 0%{opacity:1;transform:scale(1) rotate(0deg)} 100%{opacity:0;transform:scale(1.6) rotate(30deg) translateY(-20px)} }
</style>

<div class="cat-page">
  <div class="header">
    <h1 class="title">
      <span class="paw">🐾</span> CAT ZONE <span class="paw">🐾</span>
    </h1>
    <p class="subtitle">Danger level: extremely fluffy</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('attack', this)">Cat Attack</button>
    <button class="tab" onclick="switchTab('gallery', this)">Picture List</button>
  </div>

  <div id="tab-attack" style="width:100%;display:flex;flex-direction:column;align-items:center;">
    <div class="cat-frame" id="catFrame">
      <div class="placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C6 2 3 6 3 10c0 2.5 1 4.5 2.5 6L4 20l4-1.5c1.2.5 2.5.8 4 .8s2.8-.3 4-.8L20 20l-1.5-4C20 14.5 21 12.5 21 10c0-4-3-8-9-8z"/>
          <circle cx="9" cy="10" r="1" fill="currentColor"/>
          <circle cx="15" cy="10" r="1" fill="currentColor"/>
          <path d="M3 5 L6 9M21 5 L18 9"/>
        </svg>
        <span>Awaiting attack...</span>
      </div>
    </div>
    <button class="attack-btn" id="attackBtn">CAT ATTACK</button>
    <div class="counter" id="counter"></div>
    <p class="credit">Powered by <a href="https://cataas.com" target="_blank">cataas.com</a> — Cat as a Service</p>
  </div>

  <div id="tab-gallery" style="display:none; width:100%; max-width:340px;">
    <div class="gallery" id="gallery"></div>
    <div style="text-align:center; margin-top:1rem;">
      <button class="tab" style="font-family:'Black Ops One',cursive; font-size:0.85rem; letter-spacing:1px;" onclick="loadMoreThumbs()">Load more cats</button>
    </div>
    <p class="credit" style="margin-top:1rem;">Powered by <a href="https://cataas.com" target="_blank">cataas.com</a> — Cat as a Service</p>
  </div>
</div>

<script>
  let attackCount = 0;
  const frame = document.getElementById('catFrame');
  const btn = document.getElementById('attackBtn');
  const counterEl = document.getElementById('counter');
  const galleryEl = document.getElementById('gallery');

  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-attack').style.display = name === 'attack' ? 'flex' : 'none';
    document.getElementById('tab-gallery').style.display = name === 'gallery' ? 'block' : 'none';
    if (name === 'gallery' && galleryEl.children.length === 0) loadMoreThumbs();
  }

  function loadMoreThumbs() {
    for (let i = 0; i < 9; i++) {
      const img = document.createElement('img');
      img.className = 'thumb';
      img.src = `https://cataas.com/cat?width=180&height=180&t=${Date.now()}${i}`;
      img.alt = 'cat';
      img.onclick = () => {
        switchTab('attack', document.querySelectorAll('.tab')[0]);
        loadCatInFrame(img.src);
      };
      img.onerror = () => { img.src = `https://placekitten.com/180/180?image=${(i % 16) + 1}`; };
      galleryEl.appendChild(img);
    }
  }

  function loadCatInFrame(src) {
    btn.disabled = true;
    frame.classList.remove('shake');
    void frame.offsetWidth;
    frame.classList.add('shake');
    const newImg = document.createElement('img');
    newImg.className = 'hidden';
    newImg.src = src || `https://cataas.com/cat?width=320&height=280&t=${Date.now()}`;
    newImg.onload = () => {
      frame.innerHTML = '';
      frame.appendChild(newImg);
      requestAnimationFrame(() => newImg.classList.remove('hidden'));
      btn.disabled = false;
    };
    newImg.onerror = () => { btn.disabled = false; };
  }

  btn.addEventListener('click', function(e) {
    attackCount++;
    counterEl.textContent = `${attackCount} attack${attackCount !== 1 ? 's' : ''} launched`;
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'paw-trail';
        el.textContent = '🐾';
        el.style.left = (e.clientX + Math.random() * 60 - 30) + 'px';
        el.style.top = (e.clientY + Math.random() * 60 - 30) + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
      }, i * 80);
    }
    loadCatInFrame();
  });
</script>
